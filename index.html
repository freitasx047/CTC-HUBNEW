<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTC HUB - Painel de Keys</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #aaa;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #4facfe;
        }

        .stat-label {
            color: #aaa;
            margin-top: 5px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #4facfe;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            flex: 1;
            min-width: 150px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4facfe;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: linear-gradient(45deg, #43e97b, #38f9d7);
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            text-align: left;
            padding: 12px;
            background: rgba(79, 172, 254, 0.1);
            color: #4facfe;
            border-bottom: 2px solid rgba(79, 172, 254, 0.2);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-ativo {
            background: rgba(67, 233, 123, 0.2);
            color: #43e97b;
        }

        .status-inativo {
            background: rgba(245, 87, 108, 0.2);
            color: #f5576c;
        }

        .status-expirado {
            background: rgba(255, 165, 0, 0.2);
            color: #f6d365;
        }

        .key-display {
            background: rgba(79, 172, 254, 0.1);
            border: 1px solid #4facfe;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .key-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4facfe;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: rgba(79, 172, 254, 0.2);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #4facfe;
            animation: spin 0.8s ease infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .form-group {
                flex-direction: column;
            }

            .form-group input,
            .form-group select {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .key-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 CTC HUB</h1>
            <p>Painel de gerenciamento de keys</p>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statAtivas">0</div>
                <div class="stat-label">Ativas</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statInativas">0</div>
                <div class="stat-label">Inativas</div>
            </div>
        </div>

        <div class="card">
            <h2>🔑 Gerar Nova Key</h2>
            <div class="form-group">
                <select id="keyType">
                    <option value="free">FREE</option>
                    <option value="vip">VIP</option>
                    <option value="premium">PREMIUM</option>
                </select>
                <input type="number" id="keyDays" placeholder="Dias" value="30" min="1" max="365">
                <input type="text" id="keyUser" placeholder="Usuário (opcional)">
                <button class="btn btn-success" onclick="gerarKey()">✨ Gerar</button>
            </div>
            <div id="keyResult"></div>
        </div>

        <div class="card">
            <h2>📋 Lista de Keys</h2>
            <div style="margin-bottom: 15px;">
                <button class="btn btn-primary" onclick="carregarKeys()">🔄 Atualizar</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Key</th>
                            <th>Tipo</th>
                            <th>Usuário</th>
                            <th>Validade</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="keysTable">
                        <tr>
                            <td colspan="6" style="text-align: center; color: #666;">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';

        // =============================================
        // CARREGAR ESTATÍSTICAS
        // =============================================
        async function carregarStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('statTotal').textContent = data.stats.total || 0;
                    document.getElementById('statAtivas').textContent = data.stats.ativas || 0;
                    document.getElementById('statInativas').textContent = data.stats.inativas || 0;
                }
            } catch (error) {
                console.error('Erro:', error);
            }
        }

        // =============================================
        // CARREGAR LISTA DE KEYS
        // =============================================
        async function carregarKeys() {
            try {
                const response = await fetch(`${API_URL}/keys`);
                const data = await response.json();

                if (data.success) {
                    const tbody = document.getElementById('keysTable');

                    if (!data.keys || data.keys.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #666;">Nenhuma key</td></tr>';
                        return;
                    }

                    const hoje = new Date().toISOString().split('T')[0];

                    tbody.innerHTML = data.keys.map(k => {
                        const expirada = hoje > k.validade;
                        let statusClass = 'status-ativo';
                        let statusText = '✅ Ativa';

                        if (!k.ativo) {
                            statusClass = 'status-inativo';
                            statusText = '❌ Inativa';
                        } else if (expirada) {
                            statusClass = 'status-expirado';
                            statusText = '⏰ Expirada';
                        }

                        return `
                            <tr>
                                <td><code style="color: #4facfe;">${k.key}</code></td>
                                <td><span style="text-transform: uppercase;">${k.tipo}</span></td>
                                <td>${k.usuario || '-'}</td>
                                <td>${k.validade}</td>
                                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                                <td>
                                    ${k.ativo ? 
                                        `<button class="btn btn-danger" onclick="desativarKey('${k.key}')" style="padding: 5px 10px; font-size: 0.8rem;">Desativar</button>` :
                                        `<button class="btn btn-success" onclick="ativarKey('${k.key}')" style="padding: 5px 10px; font-size: 0.8rem;">Ativar</button>`
                                    }
                                </td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('keysTable').innerHTML = '<tr><td colspan="6" style="text-align: center; color: #f5576c;">❌ Erro ao carregar</td></tr>';
            }
        }

        // =============================================
        // GERAR KEY
        // =============================================
        async function gerarKey() {
            const tipo = document.getElementById('keyType').value;
            const dias = document.getElementById('keyDays').value;
            const usuario = document.getElementById('keyUser').value || 'anonimo';

            if (!dias || dias < 1) {
                alert('⚠️ Informe uma quantidade de dias válida!');
                return;
            }

            const btn = event.target;
            btn.textContent = '⏳ Gerando...';
            btn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/generate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        tipo: tipo,
                        dias: parseInt(dias),
                        usuario: usuario
                    })
                });

                const data = await response.json();

                if (data.success) {
                    const resultDiv = document.getElementById('keyResult');
                    resultDiv.innerHTML = `
                        <div class="key-display">
                            <div>
                                <span style="color: #aaa;">🔑 Nova Key:</span>
                                <div class="key-text">${data.key}</div>
                                <div style="font-size: 0.9rem; color: #aaa; margin-top: 5px;">
                                    Tipo: ${data.info.tipo.toUpperCase()} | 
                                    Validade: ${data.info.validade} | 
                                    Usuário: ${data.info.usuario}
                                </div>
                            </div>
                            <button class="copy-btn" onclick="copiarKey('${data.key}')">📋 Copiar</button>
                        </div>
                    `;
                    alert(`✅ Key gerada: ${data.key}`);
                    carregarKeys();
                    carregarStats();
                } else {
                    alert('❌ ' + (data.message || 'Erro ao gerar key'));
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('❌ Erro ao gerar key: ' + error.message);
            }

            btn.textContent = '✨ Gerar';
            btn.disabled = false;
        }

        // =============================================
        // DESATIVAR/ATIVAR KEY
        // =============================================
        async function desativarKey(key) {
            if (!confirm(`Desativar key ${key}?`)) return;

            try {
                const response = await fetch(`${API_URL}/deactivate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await response.json();

                if (data.success) {
                    alert('✅ Key desativada!');
                    carregarKeys();
                    carregarStats();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ Erro ao desativar');
            }
        }

        async function ativarKey(key) {
            try {
                const response = await fetch(`${API_URL}/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await response.json();

                if (data.success) {
                    alert('✅ Key ativada!');
                    carregarKeys();
                    carregarStats();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ Erro ao ativar');
            }
        }

        // =============================================
        // UTILITÁRIOS
        // =============================================
        function copiarKey(key) {
            navigator.clipboard.writeText(key).then(() => {
                alert('📋 Key copiada!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = key;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                textarea.remove();
                alert('📋 Key copiada!');
            });
        }

        // =============================================
        // INICIALIZAR
        // =============================================
        carregarStats();
        carregarKeys();
        setInterval(() => {
            carregarStats();
            carregarKeys();
        }, 30000);
    </script>
</body>
</html>
